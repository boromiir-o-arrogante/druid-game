<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Druid's Descent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 font-mono overflow-hidden">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const EMOJIS = { wall: "🌲", floor: "·", player: "🧙‍♂️", goblin: "👹", slime: "🦠", orc: "🧌", bat: "🦇", fog: "⬛", stairs: "🪜" };
    const MAP_W = 20; const MAP_H = 12;

    const generateMap = (floor) => {
      let map = [];
      for (let y = 0; y < MAP_H; y++) {
        let row = [];
        for (let x = 0; x < MAP_W; x++) {
          const isWall = x===0 || y===0 || x===MAP_W-1 || y===MAP_H-1 || Math.random() < 0.15;
          row.push({ x, y, t: isWall ? 'wall' : 'floor', e: null, v: false });
        }
        map.push(row);
      }
      // Escada
      map[MAP_H-2][MAP_W-2].t = 'stairs';
      // Inimigos
      for(let i=0; i<5; i++) {
        let rx = Math.floor(Math.random()*MAP_W), ry = Math.floor(Math.random()*MAP_H);
        if(map[ry][rx].t === 'floor') map[ry][rx].e = { n: 'Monstro', h: 3 + floor };
      }
      return map;
    };

    function App() {
      const [floor, setFloor] = useState(1);
      const [p, setP] = useState({ x: 2, y: 2, hp: 20, max: 20, atk: 2, xp: 0 });
      const [map, setMap] = useState(() => generateMap(1));
      const [log, setLog] = useState(["Andar 1 iniciado!"]);

      const move = (dx, dy) => {
        const nx = p.x + dx, ny = p.y + dy;
        const target = map[ny][nx];

        if (target.t === 'stairs') {
          setFloor(f => f + 1);
          setMap(generateMap(floor + 1));
          setP(prev => ({ ...prev, x: 2, y: 2 }));
          setLog(prev => ["Você desceu de andar!", ...prev]);
          return;
        }

        if (target.t === 'wall') return;

        if (target.e) {
          target.e.h -= p.atk;
          let newLog = [`Você atacou o monstro!`];
          if (target.e.h <= 0) {
            target.e = null;
            newLog.push("Inimigo derrotado!");
          } else {
            p.hp -= floor;
            newLog.push(`O monstro revidou: -${floor} HP`);
          }
          setLog(prev => [...newLog, ...prev].slice(0, 5));
          setMap([...map]);
          return;
        }

        setP(prev => ({ ...prev, x: nx, y: ny }));
      };

      useEffect(() => {
        const h = (e) => {
          if(e.key === 'w') move(0,-1); if(e.key === 's') move(0,1);
          if(e.key === 'a') move(-1,0); if(e.key === 'd') move(1,0);
        };
        window.addEventListener('keydown', h);
        return () => window.removeEventListener('keydown', h);
      }, [p, map]);

      return (
        <div className="flex flex-col items-center justify-center h-screen gap-4">
          <div className="text-emerald-500 font-bold text-xl">DRUID'S DESCENT - ANDAR {floor}</div>
          <div className="flex gap-4 p-4 bg-slate-900 border-2 border-slate-800 rounded-xl">
            <div className="bg-black p-2 border border-slate-700">
              {map.map((row, y) => (
                <div key={y} className="flex">
                  {row.map((c, x) => (
                    <div key={x} className="w-8 h-8 flex items-center justify-center text-xl">
                      {p.x === x && p.y === y ? EMOJIS.player : (c.e ? EMOJIS.goblin : EMOJIS[c.t])}
                    </div>
                  ))}
                </div>
              ))}
            </div>
            <div className="w-48 space-y-4">
              <div className="p-2 bg-slate-800 rounded border border-slate-700 text-sm">
                <div className="text-red-400 font-bold">HP: {p.hp}/{p.max}</div>
                <div className="w-full bg-slate-950 h-2 rounded mt-1 overflow-hidden">
                  <div className="bg-red-600 h-full" style={{width: `${(p.hp/p.max)*100}%`}}></div>
                </div>
                <div className="mt-2 text-orange-400">ATK: {p.atk}</div>
              </div>
              <div className="p-2 bg-slate-800 rounded border border-slate-700 h-40 overflow-hidden text-[10px]">
                {log.map((m, i) => <div key={i} className={i===0?"text-white":"text-slate-500"}>{m}</div>)}
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

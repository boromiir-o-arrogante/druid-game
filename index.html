<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost in Blackwood - Endless Dungeon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; background-color: #020617; overflow-x: hidden; color: #e2e8f0; }
    html { overflow: hidden; touch-action: none; }
    .pixel-shadow { shadow-[0_0_15px_rgba(0,0,0,0.8)] }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // EMOJIS ATUALIZADOS: Personagem alterado para menino '👦'
    const EMOJIS = { wall: "🌲", floor: "·", player: "👦", goblin: "👹", slime: "🦠", orc: "🧌", bat: "🦇", fog: "⬛", stairs: "🪜" };
    
    const ENEMY_BASE = [
      { type: 'bat', hp: 2, xp: 1, name: 'Morcego' },
      { type: 'slime', hp: 3, xp: 1, name: 'Slime' },
      { type: 'goblin', hp: 5, xp: 2, name: 'Goblin' },
      { type: 'orc', hp: 10, xp: 4, name: 'Orc' }
    ];

    const MAP_WIDTH = 24; const MAP_HEIGHT = 14; const VISION_RADIUS = 5;

    const isVisible = (cellX, cellY, player) => {
      const dx = cellX - player.x; const dy = cellY - player.y;
      const absDx = Math.abs(dx); const absDy = Math.abs(dy);
      if (absDx <= 1 && absDy <= 1) return true; 
      if (absDx > VISION_RADIUS || absDy > VISION_RADIUS) return false;
      if (player.facing === 'UP' && dy < 0 && absDx <= Math.abs(dy)) return true;
      if (player.facing === 'DOWN' && dy > 0 && absDx <= dy) return true;
      if (player.facing === 'LEFT' && dx < 0 && absDy <= Math.abs(dx)) return true;
      if (player.facing === 'RIGHT' && dx > 0 && absDy <= dx) return true;
      return false;
    };

    const generateLevel = (floor, startX, startY) => {
      const newMap = [];
      const obstacleChance = 0.15 + (floor * 0.01);
      
      for (let y = 0; y < MAP_HEIGHT; y++) {
        const row = [];
        for (let x = 0; x < MAP_WIDTH; x++) {
          const isBorder = y === 0 || y === MAP_HEIGHT - 1 || x === 0 || x === MAP_WIDTH - 1;
          const isSpawn = x === startX && y === startY;
          const isWall = (Math.random() < obstacleChance && !isSpawn && !isBorder) || isBorder;
          row.push({ x, y, terrain: isWall ? 'wall' : 'floor', entity: null, explored: false });
        }
        newMap.push(row);
      }

      let stairsPlaced = false;
      while(!stairsPlaced) {
        let sx = Math.floor(Math.random() * (MAP_WIDTH-2)) + 1;
        let sy = Math.floor(Math.random() * (MAP_HEIGHT-2)) + 1;
        if(newMap[sy][sx].terrain === 'floor' && Math.abs(sx - startX) > 10) {
          newMap[sy][sx].terrain = 'stairs';
          stairsPlaced = true;
        }
      }

      let enemiesToSpawn = 5 + Math.floor(floor / 2);
      while (enemiesToSpawn > 0) {
        let rx = Math.floor(Math.random() * (MAP_WIDTH-2)) + 1;
        let ry = Math.floor(Math.random() * (MAP_HEIGHT-2)) + 1;
        if (newMap[ry][rx].terrain === 'floor' && !newMap[ry][rx].entity && !(rx === startX && ry === startY)) {
          const base = ENEMY_BASE[Math.floor(Math.random() * Math.min(floor, ENEMY_BASE.length))];
          newMap[ry][rx].entity = { 
            ...base, 
            hp: base.hp + Math.floor(floor * 1.5),
            maxHp: base.hp + Math.floor(floor * 1.5)
          };
          enemiesToSpawn--;
        }
      }
      return newMap;
    };

    function DruidGame() {
      const [floor, setFloor] = useState(1);
      const [gameState, setGameState] = useState(() => {
        const startX = 2; const startY = 2;
        const initialMap = generateLevel(1, startX, startY);
        const player = { x: startX, y: startY, hp: 20, maxHp: 20, damage: 3, facing: 'DOWN', level: 1, xp: 0, statPoints: 0 };
        initialMap[startY][startX].entity = { type: 'player' };
        initialMap.forEach(row => row.forEach(c => { if (isVisible(c.x, c.y, player)) c.explored = true; }));
        // TÍTULO ATUALIZADO NO LOG
        return { map: initialMap, player, log: ["Lost in Blackwood: A floresta escura espera por você."] };
      });

      const nextFloor = useCallback(() => {
        const newFloorNum = floor + 1;
        setFloor(newFloorNum);
        const startX = 2; const startY = 2;
        const newMap = generateLevel(newFloorNum, startX, startY);
        const updatedPlayer = { ...gameState.player, x: startX, y: startY };
        
        newMap[startY][startX].entity = { type: 'player' };
        newMap.forEach(row => row.forEach(c => { if (isVisible(c.x, c.y, updatedPlayer)) c.explored = true; }));
        
        setGameState(prev => ({
          ...prev,
          map: newMap,
          player: updatedPlayer,
          log: [`Descendo para o Nível ${newFloorNum}...`, ...prev.log].slice(0, 5)
        }));
      }, [floor, gameState.player]);

      const movePlayer = useCallback((dx, dy) => {
        setGameState((prev) => {
          if (prev.player.statPoints > 0 || prev.player.hp <= 0) return prev;
          let newFacing = prev.player.facing;
          if (dx === 0 && dy === -1) newFacing = 'UP'; else if (dx === 0 && dy === 1) newFacing = 'DOWN';
          else if (dx === -1 && dy === 0) newFacing = 'LEFT'; else if (dx === 1 && dy === 0) newFacing = 'RIGHT';

          const newX = prev.player.x + dx; const newY = prev.player.y + dy;
          if (newY < 0 || newY >= MAP_HEIGHT || newX < 0 || newX >= MAP_WIDTH) return prev;

          const targetCell = prev.map[newY][newX];
          
          if (targetCell.terrain === 'stairs') {
            setTimeout(nextFloor, 10);
            return prev;
          }

          const newMap = prev.map.map(row => [...row]);
          let newLog = [...prev.log];
          let newPlayer = { ...prev.player, facing: newFacing };

          if (targetCell.terrain === 'wall') {
             newMap.forEach(row => row.forEach(c => { if (isVisible(c.x, c.y, newPlayer)) c.explored = true; }));
             return { ...prev, map: newMap, player: newPlayer };
          }

          if (targetCell.entity) {
            const enemy = { ...targetCell.entity };
            enemy.hp -= newPlayer.damage;
            newLog.unshift(`Você bateu no ${enemy.name}!`);
            
            if (enemy.hp > 0) {
              const enemyDmg = Math.floor(floor * 0.8) + 1;
              newPlayer.hp -= enemyDmg;
              newLog.unshift(`O ${enemy.name} revidou: -${enemyDmg} HP!`);
              newMap[newY][newX].entity = enemy;
            } else {
              newMap[newY][newX].entity = null;
              newPlayer.xp += enemy.xp;
              newLog.unshift(`Inimigo derrotado! +${enemy.xp} XP`);
              if (newPlayer.xp >= newPlayer.level * 5) { 
                newPlayer.level++; 
                newPlayer.statPoints++; 
              }
            }
            if(newPlayer.hp <= 0) newLog.unshift("⚠️ FIM DE JOGO! Recarregue a página para tentar novamente.");
            
            newMap.forEach(row => row.forEach(c => { if (isVisible(c.x, c.y, newPlayer)) c.explored = true; }));
            return { ...prev, map: newMap, player: newPlayer, log: newLog.slice(0, 5) };
          }

          newMap[prev.player.y][prev.player.x].entity = null;
          newMap[newY][newX].entity = { type: 'player' };
          newPlayer.x = newX; newPlayer.y = newY;
          newMap.forEach(row => row.forEach(c => { if (isVisible(c.x, c.y, newPlayer)) c.explored = true; }));
          return { ...prev, map: newMap, player: newPlayer, log: newLog };
        });
      }, [floor, nextFloor]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          const keys = { w: [0,-1], s: [0,1], a: [-1,0], d: [1,0], ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0] };
          if (keys[e.key]) { e.preventDefault(); movePlayer(...keys[e.key]); }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [movePlayer]);

      return (
        <div className="flex flex-col items-center justify-center min-h-screen w-full bg-slate-950 font-mono p-2 select-none">
          <div className="mb-4 text-center">
            {/* TÍTULO ATUALIZADO AQUI */}
            <h1 className="text-emerald-500 text-2xl font-black italic tracking-tighter">LOST IN BLACKWOOD</h1>
            <span className="text-slate-500 text-xs uppercase tracking-[0.3em]">Nível da Floresta: {floor}</span>
          </div>
          
          <div className="flex flex-col lg:flex-row gap-6 items-start">
            <div className="border-4 border-slate-800 bg-black p-1 rounded-xl shadow-2xl overflow-hidden overflow-x-auto max-w-full">
              {gameState.map.map((row, y) => (
                <div key={y} className="flex min-w-max">
                  {row.map((cell, x) => {
                    const visible = isVisible(x, y, gameState.player);
                    let content = "⬛"; let op = "opacity-0";
                    if (visible) { content = cell.entity ? EMOJIS[cell.entity.type] : EMOJIS[cell.terrain]; op = "opacity-100"; }
                    else if (cell.explored) { content = EMOJIS[cell.terrain]; op = "opacity-20 grayscale"; }
                    return <div key={`${x}-${y}`} className={`w-7 h-7 sm:w-9 sm:h-9 flex items-center justify-center text-xl transition-all duration-300 ${op}`}>{content}</div>;
                  })}
                </div>
              ))}
            </div>

            <div className="w-full lg:w-72 flex flex-col gap-4 h-full">
              <div className="bg-slate-900 border-2 border-slate-800 p-4 rounded-xl shadow-xl">
                <div className="flex justify-between items-center mb-4 text-sm">
                  <span className="text-emerald-400 font-bold">Nvl {gameState.player.level}</span>
                  <span className="text-slate-500 uppercase tracking-wider text-xs">{EMOJIS.player} SOBREVIVENTE</span>
                </div>
                
                <div className="mb-4">
                  <div className="flex justify-between text-xs mb-1">
                    <span className="text-red-400 uppercase font-bold tracking-tighter">Integridade (HP)</span>
                    <span className="font-bold text-slate-300">{gameState.player.hp} / {gameState.player.maxHp}</span>
                  </div>
                  <div className="w-full bg-slate-950 h-3 rounded-full overflow-hidden border border-slate-800 p-0.5 shadow-inner">
                    <div className="bg-red-600 h-full transition-all duration-500 ease-out" style={{ width: `${(gameState.player.hp / gameState.player.maxHp) * 100}%` }}></div>
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-2 text-[10px] uppercase font-bold text-slate-500">
                  <div className="bg-black/40 p-2 rounded border border-slate-800">Força de Atq: <span className="text-orange-400">⚔️ {gameState.player.damage}</span></div>
                  <div className="bg-black/40 p-2 rounded border border-slate-800">Experiência: <span className="text-blue-400">✨ {gameState.player.xp}</span></div>
                </div>
              </div>

              <div className="bg-slate-900 border-2 border-slate-800 p-2 rounded-xl">
                 <div className="bg-black p-1 rounded grid" style={{ gridTemplateColumns: `repeat(${MAP_WIDTH}, 1fr)` }}>
                    {gameState.map.map((row, y) => row.map((cell, x) => {
                        let color = "bg-transparent";
                        if (cell.explored) {
                          if (x === gameState.player.x && y === gameState.player.y) color = "bg-emerald-400";
                          else if (cell.terrain === 'stairs') color = "bg-amber-400 animate-pulse";
                          else if (cell.terrain === 'wall') color = "bg-slate-800";
                          else color = "bg-slate-900";
                        }
                        return <div key={`${x}-${y}`} className={`w-1.5 h-1.5 ${color} rounded-[1px]`}></div>;
                    }))}
                 </div>
              </div>

              <div className="bg-slate-900 border-2 border-slate-800 p-3 rounded-xl h-32 overflow-hidden max-h-32">
                <div className="text-[10px] space-y-1">
                  {gameState.log.map((m, i) => <div key={i} className={i === 0 ? "text-emerald-300 font-semibold" : "text-slate-600"}>{i === 0 ? "» " : ""}{m}</div>)}
                </div>
              </div>
            </div>
          </div>

          {gameState.player.statPoints > 0 && (
            <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-6">
              <div className="bg-slate-900 border-2 border-amber-500 p-6 rounded-2xl text-center shadow-2xl max-w-xs border-dashed">
                <h2 className="text-xl text-amber-500 font-bold mb-1 uppercase tracking-tight">Sobrevivência</h2>
                <div className="text-[10px] text-slate-500 mb-5">ESCOLHA UMA MELHORIA</div>
                <button onClick={() => setGameState(p => ({...p, player: {...p.player, maxHp: p.player.maxHp+10, hp: p.player.hp+10, statPoints: p.player.statPoints-1}}))} className="w-full mb-3 bg-emerald-900/20 border border-emerald-500 text-emerald-400 py-3 rounded-lg hover:bg-emerald-500/10 text-xs font-bold">🌿 Resistência (+10 HP Máx)</button>
                <button onClick={() => setGameState(p => ({...p, player: {...p.player, damage: p.player.damage+2, statPoints: p.player.statPoints-1}}))} className="w-full bg-orange-900/20 border border-orange-500 text-orange-400 py-3 rounded-lg hover:bg-orange-500/10 text-xs font-bold">🔥 Ferocidade (+2 Dano de Atq)</button>
              </div>
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<DruidGame />);
  </script>
</body>
</html>

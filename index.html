<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost in Blackwood - Survival</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; background-color: #020617; overflow-x: hidden; color: #e2e8f0; font-family: 'Courier New', Courier, monospace; }
    html { overflow: hidden; touch-action: none; }
    .glow-red { box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
    .glow-emerald { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const EMOJIS = { 
      wall: "🌲", floor: "·", player: "👦", goblin: "👹", 
      slime: "🦠", orc: "🧌", bat: "🦇", fog: "⬛", 
      stairs: "🪜", fruit: "🍎" 
    };
    
    const ENEMY_BASE = [
      { type: 'bat', hp: 2, xp: 1, name: 'Morcego' },
      { type: 'slime', hp: 3, xp: 1, name: 'Slime' },
      { type: 'goblin', hp: 5, xp: 2, name: 'Goblin' },
      { type: 'orc', hp: 10, xp: 4, name: 'Orc' }
    ];

    const MAP_WIDTH = 24; const MAP_HEIGHT = 14; const VISION_RADIUS = 5;

    const isVisible = (cellX, cellY, player) => {
      const dx = cellX - player.x; const dy = cellY - player.y;
      const absDx = Math.abs(dx); const absDy = Math.abs(dy);
      if (absDx <= 1 && absDy <= 1) return true; 
      if (absDx > VISION_RADIUS || absDy > VISION_RADIUS) return false;
      if (player.facing === 'UP' && dy < 0 && absDx <= Math.abs(dy)) return true;
      if (player.facing === 'DOWN' && dy > 0 && absDx <= dy) return true;
      if (player.facing === 'LEFT' && dx < 0 && absDy <= Math.abs(dx)) return true;
      if (player.facing === 'RIGHT' && dx > 0 && absDy <= dx) return true;
      return false;
    };

    const generateLevel = (floor, startX, startY) => {
      const newMap = [];
      const obstacleChance = 0.16;
      const fruitChance = 0.04; // 4% de chance de fruta em cada piso vazio

      for (let y = 0; y < MAP_HEIGHT; y++) {
        const row = [];
        for (let x = 0; x < MAP_WIDTH; x++) {
          const isBorder = y === 0 || y === MAP_HEIGHT - 1 || x === 0 || x === MAP_WIDTH - 1;
          const isSpawn = x === startX && y === startY;
          let terrain = isBorder || (Math.random() < obstacleChance && !isSpawn) ? 'wall' : 'floor';
          
          // Gerar fruta
          let entity = null;
          if (terrain === 'floor' && !isSpawn && Math.random() < fruitChance) {
            entity = { type: 'fruit' };
          }

          row.push({ x, y, terrain, entity, explored: false });
        }
        newMap.push(row);
      }

      // Escada
      let stairsPlaced = false;
      while(!stairsPlaced) {
        let sx = Math.floor(Math.random() * (MAP_WIDTH-2)) + 1;
        let sy = Math.floor(Math.random() * (MAP_HEIGHT-2)) + 1;
        if(newMap[sy][sx].terrain === 'floor' && Math.abs(sx - startX) > 12) {
          newMap[sy][sx].terrain = 'stairs';
          newMap[sy][sx].entity = null; // Limpa fruta se houver
          stairsPlaced = true;
        }
      }

      // Inimigos
      let enemiesToSpawn = 5 + Math.floor(floor / 2);
      while (enemiesToSpawn > 0) {
        let rx = Math.floor(Math.random() * (MAP_WIDTH-2)) + 1;
        let ry = Math.floor(Math.random() * (MAP_HEIGHT-2)) + 1;
        if (newMap[ry][rx].terrain === 'floor' && !newMap[ry][rx].entity && !(rx === startX && ry === startY)) {
          const base = ENEMY_BASE[Math.floor(Math.random() * Math.min(floor, ENEMY_BASE.length))];
          newMap[ry][rx].entity = { ...base, hp: base.hp + floor, maxHp: base.hp + floor };
          enemiesToSpawn--;
        }
      }
      return newMap;
    };

    function App() {
      const [floor, setFloor] = useState(1);
      const [gameState, setGameState] = useState(() => {
        const startX = 2; const startY = 2;
        const initialMap = generateLevel(1, startX, startY);
        const player = { x: startX, y: startY, hp: 20, maxHp: 20, damage: 3, facing: 'DOWN', level: 1, xp: 0, statPoints: 0 };
        initialMap[startY][startX].entity = { type: 'player' };
        initialMap.forEach(row => row.forEach(c => { if (isVisible(c.x, c.y, player)) c.explored = true; }));
        return { map: initialMap, player, log: ["Você acordou no meio de Blackwood..."] };
      });

      const nextFloor = useCallback(() => {
        const newFloorNum = floor + 1;
        setFloor(newFloorNum);
        const startX = 2; const startY = 2;
        const newMap = generateLevel(newFloorNum, startX, startY);
        const updatedPlayer = { ...gameState.player, x: startX, y: startY };
        newMap[startY][startX].entity = { type: 'player' };
        newMap.forEach(row => row.forEach(c => { if (isVisible(c.x, c.y, updatedPlayer)) c.explored = true; }));
        setGameState(prev => ({ ...prev, map: newMap, player: updatedPlayer, log: [`Andar ${newFloorNum}: O ar parece mais pesado aqui.`, ...prev.log] }));
      }, [floor, gameState.player]);

      const movePlayer = useCallback((dx, dy) => {
        setGameState((prev) => {
          if (prev.player.hp <= 0 || prev.player.statPoints > 0) return prev;
          let newFacing = prev.player.facing;
          if (dx === 0 && dy === -1) newFacing = 'UP'; else if (dx === 0 && dy === 1) newFacing = 'DOWN';
          else if (dx === -1 && dy === 0) newFacing = 'LEFT'; else if (dx === 1 && dy === 0) newFacing = 'RIGHT';

          const newX = prev.player.x + dx; const newY = prev.player.y + dy;
          if (newY < 0 || newY >= MAP_HEIGHT || newX < 0 || newX >= MAP_WIDTH) return prev;

          const targetCell = prev.map[newY][newX];
          if (targetCell.terrain === 'stairs') { setTimeout(nextFloor, 10); return prev; }

          const newMap = prev.map.map(row => [...row]);
          let newLog = [...prev.log];
          let newPlayer = { ...prev.player, facing: newFacing };

          // Mecânica de Fruta
          if (targetCell.entity && targetCell.entity.type === 'fruit') {
            newPlayer.hp = Math.min(newPlayer.hp + 5, newPlayer.maxHp);
            newLog.unshift("🍎 Você comeu uma maçã e recuperou 5 HP!");
            targetCell.entity = null;
          }

          if (targetCell.terrain === 'wall') {
             newMap.forEach(row => row.forEach(c => { if (isVisible(c.x, c.y, newPlayer)) c.explored = true; }));
             return { ...prev, map: newMap, player: newPlayer };
          }

          if (targetCell.entity && targetCell.entity.type !== 'player') {
            const enemy = { ...targetCell.entity };
            enemy.hp -= newPlayer.damage;
            newLog.unshift(`Você atacou o ${enemy.name}!`);
            if (enemy.hp > 0) {
              const enemyDmg = Math.floor(floor * 0.7) + 1;
              newPlayer.hp -= enemyDmg;
              newLog.unshift(`O ${enemy.name} revidou: -${enemyDmg} HP!`);
              newMap[newY][newX].entity = enemy;
            } else {
              newMap[newY][newX].entity = null;
              newPlayer.xp += enemy.xp;
              newLog.unshift(`Derrotou o ${enemy.name}! +${enemy.xp} XP`);
              if (newPlayer.xp >= newPlayer.level * 5) { newPlayer.level++; newPlayer.statPoints++; }
            }
            if(newPlayer.hp <= 0) newLog.unshift("💀 FIM DE JOGO!");
            newMap.forEach(row => row.forEach(c => { if (isVisible(c.x, c.y, newPlayer)) c.explored = true; }));
            return { ...prev, map: newMap, player: newPlayer, log: newLog.slice(0, 6) };
          }

          newMap[prev.player.y][prev.player.x].entity = null;
          newMap[newY][newX].entity = { type: 'player' };
          newPlayer.x = newX; newPlayer.y = newY;
          newMap.forEach(row => row.forEach(c => { if (isVisible(c.x, c.y, newPlayer)) c.explored = true; }));
          return { ...prev, map: newMap, player: newPlayer, log: newLog };
        });
      }, [floor, nextFloor]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          const keys = { w:[0,-1], s:[0,1], a:[-1,0], d:[1,0], ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0] };
          if (keys[e.key]) { e.preventDefault(); movePlayer(...keys[e.key]); }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [movePlayer]);

      return (
        <div className="flex flex-col items-center justify-center min-h-screen w-full bg-slate-950 p-4 select-none">
          <header className="mb-6 text-center">
            <h1 className="text-emerald-400 text-3xl font-black tracking-tighter italic">LOST IN BLACKWOOD</h1>
            <div className="text-[10px] text-slate-500 uppercase tracking-[0.5em] mt-1">Nível de Exploração: {floor}</div>
          </header>

          <div className="flex flex-col xl:flex-row gap-8 items-start max-w-7xl">
            {/* MAPA PRINCIPAL */}
            <div className="bg-black p-1 border-4 border-slate-900 rounded-2xl glow-emerald shadow-2xl overflow-hidden overflow-x-auto">
              {gameState.map.map((row, y) => (
                <div key={y} className="flex min-w-max">
                  {row.map((cell, x) => {
                    const visible = isVisible(x, y, gameState.player);
                    let content = "⬛"; let op = "opacity-0";
                    if (visible) { 
                      content = cell.entity ? EMOJIS[cell.entity.type] : EMOJIS[cell.terrain]; 
                      op = "opacity-100"; 
                    } else if (cell.explored) { 
                      content = EMOJIS[cell.terrain]; 
                      op = "opacity-20 grayscale"; 
                    }
                    return <div key={`${x}-${y}`} className={`w-8 h-8 md:w-10 md:h-10 flex items-center justify-center text-xl transition-all duration-300 ${op}`}>{content}</div>;
                  })}
                </div>
              ))}
            </div>

            {/* PAINEL LATERAL */}
            <div className="w-full xl:w-80 flex flex-col gap-6">
              {/* STATUS */}
              <div className="bg-slate-900 border-b-4 border-emerald-900 p-5 rounded-2xl shadow-xl">
                <div className="flex justify-between items-center mb-4">
                  <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Sobrevivente</span>
                  <span className="text-emerald-400 text-sm font-black">NVL {gameState.player.level}</span>
                </div>
                <div className="mb-4">
                  <div className="w-full bg-black/50 h-4 rounded-full border border-slate-800 p-0.5">
                    <div className="bg-gradient-to-r from-red-800 to-red-500 h-full rounded-full transition-all duration-500" style={{ width: `${(gameState.player.hp / gameState.player.maxHp) * 100}%` }}></div>
                  </div>
                  <div className="flex justify-between text-[10px] mt-1 text-slate-500 font-bold">
                    <span>HP: {gameState.player.hp} / {gameState.player.maxHp}</span>
                    <span>XP: {gameState.player.xp}</span>
                  </div>
                </div>
                <div className="flex gap-2">
                   <div className="bg-black/30 flex-1 p-2 rounded-lg border border-slate-800 text-center">
                      <div className="text-[9px] text-slate-500">ATAQUE</div>
                      <div className="text-orange-400 font-bold text-sm">⚔️ {gameState.player.damage}</div>
                   </div>
                   <div className="bg-black/30 flex-1 p-2 rounded-lg border border-slate-800 text-center">
                      <div className="text-[9px] text-slate-500">DEFESA</div>
                      <div className="text-blue-400 font-bold text-sm">🛡️ {floor}</div>
                   </div>
                </div>
              </div>

              {/* MINI-MAPA MELHORADO */}
              <div className="bg-slate-900 p-3 rounded-2xl border border-slate-800 shadow-inner">
                <div className="text-[9px] text-slate-500 mb-2 font-bold uppercase flex justify-between">
                   <span>Radar de Blackwood</span>
                   <span className="text-emerald-500 animate-pulse">● LIVE</span>
                </div>
                <div className="bg-black/80 rounded-lg p-2 flex justify-center border border-emerald-900/30">
                   <div className="grid gap-[1px]" style={{ gridTemplateColumns: `repeat(${MAP_WIDTH}, 1fr)` }}>
                    {gameState.map.map((row, y) => row.map((cell, x) => {
                        let color = "bg-transparent";
                        const visible = isVisible(x, y, gameState.player);
                        if (cell.explored) {
                          if (x === gameState.player.x && y === gameState.player.y) color = "bg-emerald-400 shadow-[0_0_5px_#34d399]";
                          else if (cell.terrain === 'stairs') color = "bg-amber-400 animate-pulse";
                          else if (cell.entity && cell.entity.type !== 'fruit' && visible) color = "bg-red-500 animate-pulse"; // MONSTRO VISTO
                          else if (cell.entity && cell.entity.type === 'fruit' && visible) color = "bg-red-300"; // FRUTA VISTA
                          else if (cell.terrain === 'wall') color = "bg-slate-800";
                          else color = "bg-slate-900";
                        }
                        return <div key={`${x}-${y}`} className={`w-1.5 h-1.5 md:w-2 md:h-2 ${color} rounded-[1px]`}></div>;
                    }))}
                   </div>
                </div>
              </div>

              {/* LOG */}
              <div className="bg-black/40 border-l-2 border-emerald-500 p-4 rounded-r-xl h-32 overflow-hidden overflow-y-auto">
                {gameState.log.map((m, i) => (
                  <div key={i} className={`text-[10px] mb-1.5 ${i === 0 ? "text-emerald-200" : "text-slate-600"}`}>
                    {i === 0 ? "» " : ""}{m}
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* LEVEL UP MODAL */}
          {gameState.player.statPoints > 0 && (
            <div className="fixed inset-0 bg-black/95 backdrop-blur-sm flex items-center justify-center z-50">
              <div className="bg-slate-900 border-2 border-amber-500 p-8 rounded-3xl text-center max-w-xs w-full glow-red">
                <h2 className="text-2xl text-amber-500 font-black mb-1 uppercase italic italic tracking-tighter">Level Up!</h2>
                <p className="text-slate-500 text-[10px] mb-6 tracking-widest">SINTA O CRESCIMENTO DA FLORESTA</p>
                <div className="flex flex-col gap-4">
                  <button onClick={() => setGameState(p => ({...p, player: {...p.player, maxHp: p.player.maxHp+10, hp: p.player.hp+10, statPoints: p.player.statPoints-1}}))} 
                    className="bg-emerald-950/30 border border-emerald-500 text-emerald-400 py-4 rounded-xl hover:bg-emerald-500 hover:text-white transition-all font-bold">
                    🌿 Vigor (+10 HP)
                  </button>
                  <button onClick={() => setGameState(p => ({...p, player: {...p.player, damage: p.player.damage+2, statPoints: p.player.statPoints-1}}))} 
                    className="bg-orange-950/30 border border-orange-500 text-orange-400 py-4 rounded-xl hover:bg-orange-500 hover:text-white transition-all font-bold">
                    ⚔️ Fúria (+2 Dano)
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

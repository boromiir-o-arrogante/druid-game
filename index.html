<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Druid's Descent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; background-color: #020617; overflow-x: hidden; }
    /* Previne scroll acidental ao usar as setas */
    html { overflow: hidden; touch-action: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const EMOJIS = { wall: "🌲", floor: "·", player: "🧙‍♂️", goblin: "👹", slime: "🦠", orc: "🧌", bat: "🦇", fog: "⬛" };
    const ENEMY_TYPES = [
      { type: 'bat', hp: 2, xp: 1, name: 'Morcego' }, { type: 'slime', hp: 2, xp: 1, name: 'Slime' },
      { type: 'goblin', hp: 4, xp: 2, name: 'Goblin' }, { type: 'orc', hp: 8, xp: 4, name: 'Orc' }
    ];

    const MAP_WIDTH = 20; const MAP_HEIGHT = 12; const OBSTACLE_CHANCE = 0.15; const MAX_ENEMIES = 8; const VISION_RADIUS = 5;

    const isVisible = (cellX, cellY, player) => {
      const dx = cellX - player.x; const dy = cellY - player.y;
      const absDx = Math.abs(dx); const absDy = Math.abs(dy);
      if (absDx <= 1 && absDy <= 1) return true; 
      if (absDx > VISION_RADIUS || absDy > VISION_RADIUS) return false;
      if (player.facing === 'UP' && dy < 0 && absDx <= Math.abs(dy)) return true;
      if (player.facing === 'DOWN' && dy > 0 && absDx <= dy) return true;
      if (player.facing === 'LEFT' && dx < 0 && absDy <= Math.abs(dx)) return true;
      if (player.facing === 'RIGHT' && dx > 0 && absDy <= dx) return true;
      return false;
    };

    const generateMap = (width, height, startX, startY) => {
      const newMap = [];
      for (let y = 0; y < height; y++) {
        const row = [];
        for (let x = 0; x < width; x++) {
          const isBorder = y === 0 || y === height - 1 || x === 0 || x === width - 1;
          const isSpawnPoint = x === startX && y === startY;
          const isInternalWall = Math.random() < OBSTACLE_CHANCE && !isSpawnPoint && !isBorder;
          row.push({ x, y, terrain: isBorder || isInternalWall ? 'wall' : 'floor', entity: null, explored: false });
        }
        newMap.push(row);
      }
      let enemiesSpawned = 0;
      while (enemiesSpawned < MAX_ENEMIES) {
        const randomX = Math.floor(Math.random() * width); const randomY = Math.floor(Math.random() * height);
        const targetCell = newMap[randomY][randomX];
        if (targetCell.terrain === 'floor' && !targetCell.entity && !(randomX === startX && randomY === startY)) {
          targetCell.entity = { ...ENEMY_TYPES[Math.floor(Math.random() * ENEMY_TYPES.length)] };
          enemiesSpawned++;
        }
      }
      return newMap;
    };

    function DruidGame() {
      const [gameState, setGameState] = useState(() => {
        const startX = Math.floor(MAP_WIDTH / 2); const startY = Math.floor(MAP_HEIGHT / 2);
        const initialMap = generateMap(MAP_WIDTH, MAP_HEIGHT, startX, startY);
        const initialPlayer = { x: startX, y: startY, hp: 15, maxHp: 15, damage: 2, facing: 'DOWN', level: 1, xp: 0, statPoints: 0 };
        initialMap[startY][startX].entity = { type: 'player' };
        initialMap.forEach(row => row.forEach(cell => { if (isVisible(cell.x, cell.y, initialPlayer)) cell.explored = true; }));
        return { map: initialMap, player: initialPlayer, log: ["Bem-vindo ao Druid's Descent!"] };
      });

      const movePlayer = useCallback((dx, dy) => {
        setGameState((prev) => {
          if (prev.player.statPoints > 0 || prev.player.hp <= 0) return prev;
          let newFacing = prev.player.facing;
          if (dx === 0 && dy === -1) newFacing = 'UP'; else if (dx === 0 && dy === 1) newFacing = 'DOWN';
          else if (dx === -1 && dy === 0) newFacing = 'LEFT'; else if (dx === 1 && dy === 0) newFacing = 'RIGHT';

          const newX = prev.player.x + dx; const newY = prev.player.y + dy;
          if (newY < 0 || newY >= MAP_HEIGHT || newX < 0 || newX >= MAP_WIDTH) return prev;

          const targetCell = prev.map[newY][newX];
          const newMap = prev.map.map(row => [...row]);
          let newLog = [...prev.log];
          let newPlayer = { ...prev.player, facing: newFacing };

          if (targetCell.terrain === 'wall') {
             newMap.forEach(row => row.forEach(c => { if (isVisible(c.x, c.y, newPlayer)) c.explored = true; }));
             return { ...prev, map: newMap, player: newPlayer };
          }

          if (targetCell.entity && targetCell.entity.type !== 'player') {
            const enemy = { ...targetCell.entity };
            enemy.hp -= newPlayer.damage;
            newLog.unshift(`Dano no ${enemy.name}!`);
            if (enemy.hp <= 0) {
              newMap[newY][newX].entity = null;
              newPlayer.xp += enemy.xp;
              if (newPlayer.xp >= newPlayer.level * 5) { newPlayer.level++; newPlayer.statPoints++; }
            } else { newMap[newY][newX].entity = enemy; }
            newMap.forEach(row => row.forEach(c => { if (isVisible(c.x, c.y, newPlayer)) c.explored = true; }));
            return { ...prev, map: newMap, player: newPlayer, log: newLog.slice(0, 5) };
          }

          newMap[prev.player.y][prev.player.x].entity = null;
          newMap[newY][newX].entity = { type: 'player' };
          newPlayer.x = newX; newPlayer.y = newY;
          newMap.forEach(row => row.forEach(c => { if (isVisible(c.x, c.y, newPlayer)) c.explored = true; }));
          return { ...prev, map: newMap, player: newPlayer, log: newLog };
        });
      }, []);

      useEffect(() => {
        const handleKeyDown = (e) => {
          const keys = { w: [0,-1], s: [0,1], a: [-1,0], d: [1,0], ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0] };
          if (keys[e.key]) { e.preventDefault(); movePlayer(...keys[e.key]); }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [movePlayer]);

      const hpPercent = (gameState.player.hp / gameState.player.maxHp) * 100;

      return (
        <div className="flex flex-col items-center justify-center min-h-screen w-full bg-slate-950 text-slate-200 font-mono p-2 md:p-6 overflow-y-auto">
          <h1 className="text-emerald-500 text-xl md:text-3xl mb-4 font-bold tracking-widest text-center">DRUID'S DESCENT</h1>
          
          <div className="flex flex-col lg:flex-row gap-4 w-full max-w-6xl items-start justify-center">
            {/* MAPA */}
            <div className="border-4 border-slate-800 bg-black p-1 rounded-lg shadow-2xl mx-auto overflow-auto max-w-full">
              {gameState.map.map((row, y) => (
                <div key={y} className="flex">
                  {row.map((cell, x) => {
                    const visible = isVisible(x, y, gameState.player);
                    let content = "⬛"; let op = "opacity-0";
                    if (visible) { content = cell.entity ? EMOJIS[cell.entity.type] : EMOJIS[cell.terrain]; op = "opacity-100"; }
                    else if (cell.explored) { content = EMOJIS[cell.terrain]; op = "opacity-20 grayscale"; }
                    return <div key={`${x}-${y}`} className={`w-6 h-6 sm:w-8 sm:h-8 md:w-10 md:h-10 flex items-center justify-center text-lg sm:text-2xl transition-all duration-300 ${op}`}>{content}</div>;
                  })}
                </div>
              ))}
            </div>

            {/* STATUS PANEL */}
            <div className="flex flex-col w-full lg:w-72 gap-4 h-full">
              <div className="bg-slate-900 border-2 border-slate-800 p-4 rounded-lg shadow-lg">
                <h2 className="text-emerald-400 font-bold mb-3 uppercase border-b border-slate-800 pb-1">Status</h2>
                
                {/* BARRA DE HP */}
                <div className="mb-4">
                  <div className="flex justify-between text-xs mb-1">
                    <span className="font-bold text-red-400">VIDA (HP)</span>
                    <span>{gameState.player.hp}/{gameState.player.maxHp}</span>
                  </div>
                  <div className="w-full bg-slate-800 h-4 rounded-full border border-slate-700 overflow-hidden">
                    <div className="bg-red-600 h-full transition-all duration-500 ease-out" style={{ width: `${hpPercent}%` }}></div>
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-2 text-sm">
                  <div className="bg-slate-800 p-2 rounded text-center">
                    <div className="text-xs text-slate-400">NÍVEL</div>
                    <div className="font-bold text-blue-400">{gameState.player.level}</div>
                  </div>
                  <div className="bg-slate-800 p-2 rounded text-center">
                    <div className="text-xs text-slate-400">DANO</div>
                    <div className="font-bold text-orange-400">{gameState.player.damage}</div>
                  </div>
                </div>
              </div>

              <div className="bg-slate-900 border-2 border-slate-800 p-4 rounded-lg flex-1 shadow-lg min-h-[120px]">
                <h2 className="text-slate-400 font-bold mb-2 uppercase border-b border-slate-800 pb-1 text-xs">Diário de Combate</h2>
                <div className="text-[10px] sm:text-xs space-y-1">
                  {gameState.log.map((m, i) => <div key={i} className={i === 0 ? "text-white" : "text-slate-500"}>{i === 0 ? "> " : ""}{m}</div>)}
                </div>
              </div>
              
              <p className="text-[10px] text-slate-600 text-center italic">Use WASD ou Setas para mover</p>
            </div>
          </div>

          {/* OVERLAY DE LEVEL UP */}
          {gameState.player.statPoints > 0 && (
            <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
              <div className="bg-slate-900 border-2 border-amber-500 p-6 rounded-2xl text-center max-w-xs w-full shadow-[0_0_50px_rgba(245,158,11,0.2)]">
                <h2 className="text-2xl text-amber-400 mb-2 font-black italic">LEVEL UP!</h2>
                <p className="text-slate-400 mb-6 text-sm">Escolha sua melhoria:</p>
                <div className="flex flex-col gap-3">
                  <button onClick={() => setGameState(p => ({...p, player: {...p.player, maxHp: p.player.maxHp+5, hp: p.player.hp+5, statPoints: p.player.statPoints-1}}))} className="bg-red-900/30 hover:bg-red-900/50 border border-red-500 text-red-400 py-3 rounded-lg transition-all">+5 Vida Máxima</button>
                  <button onClick={() => setGameState(p => ({...p, player: {...p.player, damage: p.player.damage+1, statPoints: p.player.statPoints-1}}))} className="bg-orange-900/30 hover:bg-orange-900/50 border border-orange-500 text-orange-400 py-3 rounded-lg transition-all">+1 Dano de Ataque</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<DruidGame />);
  </script>
</body>
</html>
